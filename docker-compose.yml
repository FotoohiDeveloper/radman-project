networks:
  radman_net:
    driver: bridge

services:
  postgres_db:
    image: postgres:17-alpine
    container_name: radman_postgres
    networks:
      - radman_net
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data

  redis_db:
    image: redis:alpine
    container_name: radman_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - radman_net
    volumes:
      - ./redis.conf:/etc/redis/redis.conf
    command: ["redis-server", "/etc/redis/redis.conf"]

  radman_api:
    build: ./backend
    container_name: radman_backend
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - postgres_db
    environment:
      - GODEBUG=netdns=go
      - APP_ENV=production
      - DATABASE_URL=host=postgres_db user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_DB} port=5432 sslmode=disable TimeZone=Asia/Tehran
    env_file:
      - ./backend/.env
    networks:
      - radman_net

  radman_ingestion:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    container_name: radman_ingestion
    restart: always
    ports:
      - "50051:50051"
    depends_on:
      - redis_db
    environment:
      - REDIS_URL=redis://${REDIS_USER}:${REDIS_PASS}@redis_db:6379/0
      - GODEBUG=netdns=go
    env_file:
      - ./backend/.env
    networks:
      - radman_net

  radman_processor:
    build:
      context: ./processor
      dockerfile: Dockerfile
    container_name: radman_processor
    restart: always
    depends_on:
      - redis_db
      - postgres_db
    environment:
      - REDIS_ADDR=redis_db:6379
      - REDIS_USER=${REDIS_USER}
      - REDIS_PASS=${REDIS_PASS}
      - PROCESSOR_DATABASE_URL=host=postgres_db user=${POSTGRES_USER} password=${POSTGRES_PASSWORD} dbname=${POSTGRES_TRACKING_DB} port=5432 sslmode=disable TimeZone=Asia/Tehran
    networks:
      - radman_net
